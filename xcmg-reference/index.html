<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>XCMG Gas Reference Tool</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #0f1117;
  --surface:  #181b23;
  --panel:    #1e2130;
  --border:   #2a2e3d;
  --border2:  #363b50;
  --text:     #e8eaf0;
  --muted:    #7b82a0;
  --dim:      #4a5068;
  --coned:    #4ab3e8;

  --c-service:     #4ab3e8;
  --c-main:        #6c8fff;
  --c-leak:        #ff5f5f;
  --c-excavation:  #f0a030;
  --c-restoration: #48c98e;
  --c-sawcut:      #d966d6;
  --c-electric:    #b07aff;
  --c-misc:        #7b8ab0;
  --c-common:      #ffd04b;

  --radius: 6px;
  --font: -apple-system, "Segoe UI", system-ui, sans-serif;
  --mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
}

html,body { height:100%; }

html {
  height: 100%;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  height: 100%;
  overflow-x: hidden;
}

/* ── STICKY WRAPPER ── */
.sticky-top {
  position: sticky;
  top: 0;
  z-index: 100;
}

/* ── SITE NAV ── */
.sitenav{background:#07090f;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 16px;height:38px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.sitenav::-webkit-scrollbar{display:none;}
.sitenav a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0 10px;height:38px;display:flex;align-items:center;border-bottom:2px solid transparent;white-space:nowrap;transition:color 0.15s;}
.sitenav a:hover{color:var(--text);}
.sitenav a.active{color:var(--coned);border-bottom-color:var(--coned);}
.sitenav a.hub-link{color:var(--text);font-weight:800;}
.sitenav a.hub-link.active{color:var(--coned);}
.nav-divider{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 4px;}

/* ── HEADER ── */
.header {
  background: #0a0c12;
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 52px;
}

/* ── CONTROLS ── */
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.logo {
  background: var(--coned);
  color: #000;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 5px 10px;
  border-radius: 3px;
  flex-shrink: 0;
  font-family: var(--font);
}

.header-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text);
  opacity: 0.9;
}

.header-spacer { flex: 1; }

.count-badge {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.count-badge span { color: var(--coned); font-weight: 700; }


.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-size: 14px;
  pointer-events: none;
}

#searchInput {
  width: 100%;
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 9px 70px 9px 36px;
  outline: none;
  transition: border-color 0.15s;
}
#searchInput:focus { border-color: var(--coned); }
#searchInput::placeholder { color: var(--dim); }

.clear-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--border2);
  border: none;
  border-radius: 3px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 7px;
  cursor: pointer;
  display: none;
  font-family: var(--font);
  letter-spacing: 0.5px;
}
.clear-btn.show { display: block; }
.clear-btn:hover { background: var(--c-leak); color: #fff; }

/* tag search */
.search-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 0 2px;
}
.stag {
  background: rgba(74,179,232,0.12);
  border: 1px solid rgba(74,179,232,0.3);
  color: var(--coned);
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
}
.stag-x {
  cursor: pointer;
  opacity: 0.6;
  font-size: 13px;
  line-height: 1;
}
.stag-x:hover { opacity: 1; color: var(--c-leak); }

.view-toggle {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.view-btn {
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 16px;
  padding: 7px 10px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1;
}
.view-btn.active, .view-btn:hover {
  border-color: var(--coned);
  color: var(--coned);
  background: rgba(74,179,232,0.08);
}

/* ── FILTER PILLS ── */
.filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.fpill {
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.3px;
  font-family: var(--font);
}
.fpill:hover { border-color: var(--border2); color: var(--text); }
.fpill.active {
  color: #000;
  border-color: transparent;
  font-weight: 700;
}
.fpill[data-cat="all"].active        { background: var(--text); color: #000; }
.fpill[data-cat="common"].active     { background: var(--c-common); }
.fpill[data-cat="gas-service"].active{ background: var(--c-service); }
.fpill[data-cat="gas-main"].active   { background: var(--c-main); }
.fpill[data-cat="gas-leak"].active   { background: var(--c-leak); }
.fpill[data-cat="excavation"].active { background: var(--c-excavation); }
.fpill[data-cat="restoration"].active{ background: var(--c-restoration); }
.fpill[data-cat="saw-cut"].active    { background: var(--c-sawcut); }
.fpill[data-cat="electric"].active   { background: var(--c-electric); }
.fpill[data-cat="misc"].active       { background: var(--c-misc); color: #fff; }

/* ── MAIN CONTENT ── */
.main { padding: 12px 16px 32px; }

/* ── GRID VIEW ── */
#itemsGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 8px;
}

.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.15s, transform 0.1s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.card-accent {
  height: 3px;
  flex-shrink: 0;
}

.card-body { padding: 10px 12px 11px; flex: 1; display: flex; flex-direction: column; gap: 6px; }

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  justify-content: space-between;
}

.card-code {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1.2;
}

.card-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }

.star { color: var(--c-common); font-size: 13px; }

.type-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.tb-macro       { background: rgba(74,179,232,0.15); color: var(--c-service); }
.tb-micro       { background: rgba(72,201,142,0.15); color: var(--c-restoration); }
.tb-incremental { background: rgba(240,160,48,0.15); color: var(--c-excavation); }
.tb-standalone  { background: rgba(255,208,75,0.15); color: var(--c-common); }

.card-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.45;
  flex: 1;
}

.card-note {
  font-size: 11.5px;
  color: var(--c-common);
  background: rgba(255,208,75,0.07);
  border-left: 2px solid var(--c-common);
  padding: 4px 8px;
  border-radius: 0 3px 3px 0;
  line-height: 1.4;
}

.card-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.unit-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.3px;
}

.cat-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }

.cat-chip {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  opacity: 0.85;
}

/* ── LIST VIEW ── */
#itemsList { display: none; }
#itemsGroup { display: none; }

/* ── LIST VIEW — ROW BASED (no table, no horizontal scroll) ── */
.list-row {
  display: flex;
  align-items: flex-start;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  transition: background 0.1s;
  min-width: 0;
}
.list-row:hover { background: var(--surface); }

.row-accent {
  width: 3px;
  min-width: 3px;
  border-radius: 2px;
  align-self: stretch;
  margin-top: 2px;
}

.row-star {
  font-size: 12px;
  min-width: 16px;
  padding-top: 1px;
  flex-shrink: 0;
}

.row-code {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  min-width: 70px;
  flex-shrink: 0;
  padding-top: 1px;
}

.row-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.row-desc {
  font-size: 13px;
  color: #ffffff;
  line-height: 1.4;
  word-break: break-word;
}

.row-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.row-unit {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}

.row-note {
  font-size: 11px;
  color: var(--c-common);
  line-height: 1.3;
}

/* desktop: show extra info inline */
@media (min-width: 601px) {
  .row-code { min-width: 90px; }
}

/* ── GROUP VIEW ── */

.group-section { margin-bottom: 24px; }
.group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius);
  margin-bottom: 8px;
  border-left: 4px solid;
}
.group-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.group-count {
  font-family: var(--mono);
  font-size: 11px;
  opacity: 0.6;
}

/* ── NO RESULTS ── */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim);
  font-size: 14px;
  letter-spacing: 1px;
  grid-column: 1/-1;
}
.no-results strong { color: var(--muted); display: block; font-size: 18px; margin-bottom: 8px; }

/* ── MULTI-SEARCH TAGS ── */
.search-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 0 2px;
}
.stag {
  background: rgba(74,179,232,0.12);
  border: 1px solid rgba(74,179,232,0.3);
  color: var(--coned);
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
}
.stag-x {
  cursor: pointer;
  opacity: 0.6;
  font-size: 13px;
  line-height: 1;
}
.stag-x:hover { opacity: 1; color: var(--c-leak); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  /* Force list view only on mobile - hide grid/group buttons */
  #btnGrid, #btnGroup { display: none; }

  /* Single-row horizontal scroll for filter pills */
  .filter-row {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .fpill { flex-shrink: 0; }

  /* Search tags also scroll */
  .search-tags {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .search-tags::-webkit-scrollbar { display: none; }

  /* Bigger tap targets on search */
  #searchInput { font-size: 16px; } /* prevents iOS zoom on focus */

  /* Tighter padding on mobile */
  .main { padding: 8px 10px 40px; }
  .controls { padding: 8px 10px; gap: 6px; }
  .header { padding: 0 12px; height: 46px; }
  .header-title { font-size: 13px; letter-spacing: 1px; }
  .sitenav { padding: 0 10px; }
  .count-badge { font-size: 11px; padding: 3px 8px; }
}

@media (min-width: 900px) {
  #itemsGrid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
}
@media (min-width: 1400px) {
  #itemsGrid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
  .main { padding: 14px 24px 40px; }
  .controls { padding: 10px 24px; }
  .header { padding: 0 24px; }
}
</style>
</head>
<body>

<div class="sticky-top">
<nav class="sitenav">
  <a href="../index.html" class="hub-link">⌂ Hub</a>
  <div class="nav-divider"></div>
  <a href="index.html" class="active">⚒ Item Search</a>
  <div class="nav-divider"></div>
  <a href="../quick-reference/index.html">📋 Quick Reference</a>
  <div class="nav-divider"></div>
  <a href="../gas-symbols/index.html">🗺 Gas Symbols</a>
  <div class="nav-divider"></div>
  <a href="../charging-guide/index.html">💰 Charging Guide</a>
</nav>

<header class="header">
  <div class="logo">XCMG</div>
  <div class="header-title">Gas Reference Tool</div>
  <div class="header-spacer"></div>
  <div class="count-badge"><span id="countNum">0</span> items</div>
</header>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search code or keyword — press Space or Enter to add tag" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn">CLEAR</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnList" title="List view">≡</button>
      <button class="view-btn" id="btnGrid" title="Grid view">⊞</button>
      <button class="view-btn" id="btnGroup" title="Group by category">◫</button>
    </div>
  </div>
  <div id="searchTags" class="search-tags" style="display:none;"></div>
  <div class="filter-row" id="filterRow">
    <button class="fpill active" data-cat="all">All</button>
    <button class="fpill" data-cat="common">⭐ Common</button>
    <button class="fpill" data-cat="excavation">Excavation</button>
    <button class="fpill" data-cat="restoration">Restoration</button>
    <button class="fpill" data-cat="gas-main">Gas Main</button>
    <button class="fpill" data-cat="gas-service">Gas Service</button>
    <button class="fpill" data-cat="gas-leak">Gas Leak</button>
    <button class="fpill" data-cat="saw-cut">Saw Cut</button>
    <button class="fpill" data-cat="misc">Misc</button>
    <button class="fpill" data-cat="electric">Electric</button>
  </div>
</div>
</div><!-- /sticky-top -->

<div class="main">
  <div id="itemsGrid"></div>
  <div id="itemsList"><div id="listBody"></div></div>
  <div id="itemsGroup"></div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const CAT_META = {
  'gas-service':  { label:'Gas Service',  color:'var(--c-service)' },
  'gas-main':     { label:'Gas Main',     color:'var(--c-main)' },
  'gas-leak':     { label:'Gas Leak',     color:'var(--c-leak)' },
  'excavation':   { label:'Excavation',   color:'var(--c-excavation)' },
  'restoration':  { label:'Restoration',  color:'var(--c-restoration)' },
  'saw-cut':      { label:'Saw Cut',      color:'var(--c-sawcut)' },
  'electric':     { label:'Electric',     color:'var(--c-electric)' },
  'misc':         { label:'Misc',         color:'var(--c-misc)' },
};

const UNIT_FULL = {
  CY:'Cubic Yard (CY)', LF:'Linear Foot (LF)', SF:'Square Foot (SF)',
  EA:'Each (EA)', HR:'Hour (HR)'
};

const COMMON = new Set([
  'T43','T2R','T7','T7A','T7R','T101','T101A','T350','GT61',
  'T50','T51','T51H',
  'G2AI','G2BI','G2CI','G2DI',
  'G2AII','G2BII','G2CII','G2DII',
  'G26A','G26B','G26C','G26D',
  'G27A','G27B','G27C','G27D',
  'GT18A','GT18B','GT18C','GT18D',
  'G18',
  'GT19A','GT19B','GT19C','GT19D',
  'GT42A','GT42B','GT42C',
  'GT31A','GT31B','GT31C','GT31D',
  'GT200A','GT200AS','GT200B','GT200BS',
  'G5AI','G5BI','G5CI',
  'G4JI','G4KI','G4LI',
  'G3AI','G3BI','G3CI',
]);

// item: {code, desc, unit, type, cats:[], note?, also?}
// type: Macro | Micro | Incremental | Stand Alone | ''
const ITEMS = [
  // ── RESTORATION ──
  {code:'T1',   desc:'Asphalt street pavement — no concrete base or <8" asphalt', unit:'CY', type:'Micro', cats:['restoration']},
  {code:'T2',   desc:'Street surface pavement — any base concrete, block, brick, or asphalt >8"', unit:'CY', type:'Micro', cats:['restoration']},
  {code:'T2C',  desc:'Same as T2 — must use pneumatic gun with 3" or larger bit', unit:'CY', type:'Micro', cats:['restoration']},

  {code:'T7',   desc:'Plain concrete driveways or sidewalks — Excavation Only (× 0.33 ft)', unit:'CY', type:'Micro', cats:['restoration'], note:'Multiply thickness × 0.33 to convert to feet for CY calc'},
  {code:'T7A',  desc:'Plain concrete driveways or sidewalks — Restoration Only (× 0.33 ft)', unit:'CY', type:'Micro', cats:['restoration'], note:'Installation only — no excavation'},
  {code:'T7R',  desc:'Plain concrete driveways or sidewalks — Excavation and Full Restoration (× 0.33 ft)', unit:'CY', type:'Micro', cats:['restoration'], note:'Most common sidewalk item'},
  {code:'T9',   desc:'Block surface — decorative flagstone, brick, Z brick, bluestone with or without base', unit:'SF', type:'Micro', cats:['restoration'], note:'Set aside blocks and special pavers for reuse'},
  {code:'T15',  desc:'Furnish and install topsoil 6 inches deep', unit:'SF', type:'Micro', cats:['restoration']},
  {code:'T16',  desc:'Furnish and install sod', unit:'SF', type:'Micro', cats:['restoration']},
  {code:'T21',  desc:'Concrete curbs, any depth', unit:'LF', type:'Micro', cats:['restoration']},
  {code:'T22',  desc:'Granite, stone, or similar curbs', unit:'LF', type:'Micro', cats:['restoration']},
  {code:'T23',  desc:'Steel or steel nosed curbs', unit:'LF', type:'Micro', cats:['restoration']},
  {code:'T30',  desc:'Furnish, place, and maintain temporary pavement of asphaltic composition', unit:'CY', type:'Micro', cats:['restoration']},
  {code:'T31',  desc:'Furnish and place binder base', unit:'CY', type:'Micro', cats:['restoration']},
  {code:'T32',  desc:'Furnish and place concrete', unit:'CY', type:'Micro', cats:['restoration']},

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let activeCat = 'all';
let activeView = 'grid'; // grid | list | group
let searchTags = []; // active tag array

function matches(item, term) {
  const t = term.toLowerCase();
  return item.code.toLowerCase().includes(t)
    || item.desc.toLowerCase().includes(t)
    || (item.note && item.note.toLowerCase().includes(t))
    || item.unit.toLowerCase().includes(t)
    || item.type.toLowerCase().includes(t)
    || item.cats.some(c => c.includes(t));
}

function filterItems() {
  return ITEMS.filter(item => {
    const catOk = activeCat === 'all' ? true
      : activeCat === 'common' ? COMMON.has(item.code)
      : item.cats.includes(activeCat);
    if (!catOk) return false;
    // match ANY tag
    if (searchTags.length === 0) return true;
    return searchTags.some(t => matches(item, t));
  });
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function primaryCat(item) {
  const order = ['gas-main','gas-service','gas-leak','excavation','restoration','saw-cut','electric','misc'];
  for (const c of order) if (item.cats.includes(c)) return c;
  return 'misc';
}

function catColor(cat) {
  return CAT_META[cat]?.color || 'var(--c-misc)';
}

function typeBadgeHtml(type) {
  if (!type) return '';
  const map = {
    'Macro':'tb-macro','Micro':'tb-micro',
    'Incremental':'tb-incremental','Stand Alone':'tb-standalone'
  };
  return `<span class="type-badge ${map[type]||''}">${type}</span>`;
}


function sortItems(arr) {
  return [...arr].sort((a,b) => a.code.localeCompare(b.code));
}

// ─────────────────────────────────────────────
// CARD HTML
// ─────────────────────────────────────────────
function cardHtml(item) {
  const isCommon = COMMON.has(item.code);
  const pc = primaryCat(item);
  const color = catColor(pc);
  const catChips = item.cats.length > 1
    ? item.cats.map(c => `<span class="cat-chip" style="background:${catColor(c)}22;color:${catColor(c)}">${CAT_META[c]?.label||c}</span>`).join('')
    : '';

  const noteHtml = item.note
    ? `<div class="card-note">${(item.note).replace(/—/g,'&#8212;')}</div>` : '';
  const cardDesc = (item.desc||'').replace(/—/g,'&#8212;').replace(/×/g,'&#215;');

  return `<div class="card">
    <div class="card-accent" style="background:${color}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-code">${item.code}</div>
        <div class="card-badges">
          ${isCommon ? '<span class="star">⭐</span>' : ''}
          ${typeBadgeHtml(item.type)}
        </div>
      </div>
      <div class="card-desc">${cardDesc}</div>
      ${noteHtml}
      <div class="card-foot">
        <span class="unit-pill">${UNIT_FULL[item.unit]||item.unit}</span>
        <div class="cat-chips">${catChips}</div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// SEARCH TAGS
// ─────────────────────────────────────────────
function renderTags() {
  const container = document.getElementById('searchTags');
  if (searchTags.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = searchTags.map((t,i) =>
    `<span class="stag">${t}<span class="stag-x" data-i="${i}">✕</span></span>`
  ).join('');
}

function addTag(val) {
  const trimmed = val.trim();
  if (!trimmed || searchTags.includes(trimmed)) return;
  searchTags.push(trimmed);
  renderTags();
  render();
}

function removeTag(i) {
  searchTags.splice(i, 1);
  renderTags();
  render();
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const val = searchInput.value.trim();
    if (val) {
      e.preventDefault();
      addTag(val);
      searchInput.value = '';
      clearBtn.classList.toggle('show', searchTags.length > 0);
    }
  } else if (e.key === 'Backspace' && searchInput.value === '' && searchTags.length > 0) {
    removeTag(searchTags.length - 1);
    clearBtn.classList.toggle('show', searchTags.length > 0);
  }
});

// also live-filter as you type (before committing tag)
searchInput.addEventListener('input', e => {
  const val = e.target.value.trim();
  clearBtn.classList.toggle('show', val.length > 0 || searchTags.length > 0);
  // live preview: filter on current input + existing tags combined
  render();
});

// override filterItems to also check raw input
const _origFilter = filterItems;
window._liveFilter = function() {
  const liveVal = searchInput.value.trim().toLowerCase();
  return ITEMS.filter(item => {
    const catOk = activeCat === 'all' ? true
      : activeCat === 'common' ? COMMON.has(item.code)
      : item.cats.includes(activeCat);
    if (!catOk) return false;
    const allTerms = [...searchTags.map(t => t.toLowerCase())];
    if (liveVal) allTerms.push(liveVal);
    if (allTerms.length === 0) return true;
    return allTerms.some(t => matches(item, t));
  });
};

// patch render to use live filter
const _origRender = render;
function render() {
  const filtered = sortItems(window._liveFilter());
  document.getElementById('countNum').textContent = filtered.length;

  if (activeView === 'grid') {
    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = filtered.length
      ? filtered.map(cardHtml).join('')
      : `<div class="no-results"><strong>NO ITEMS FOUND</strong>Try a different search or filter</div>`;

  } else if (activeView === 'list') {
    const body = document.getElementById('listBody');
    body.innerHTML = filtered.map(item => {
      const pc = primaryCat(item);
      const color = catColor(pc);
      const isCommon = COMMON.has(item.code);
      const noteLine = item.note ? `<div class="row-note">${item.note}</div>` : '';
      const typeLine = item.type ? typeBadgeHtml(item.type) : '';
      const desc = (item.desc || '').replace(/—/g, '&#8212;').replace(/×/g, '&#215;');
      const note = (item.note || '').replace(/—/g, '&#8212;');
      return `<div class="list-row">
        <div class="row-accent" style="background:${color}"></div>
        <div class="row-star">${isCommon ? '⭐' : ''}</div>
        <div class="row-code">${item.code}</div>
        <div class="row-body">
          <div class="row-desc">${desc}</div>
          <div class="row-meta">
            <span class="row-unit">${UNIT_FULL[item.unit]||item.unit}</span>
            ${typeLine}
          </div>
          ${note ? `<div class="row-note">${note}</div>` : ''}
        </div>
      </div>`;
    }).join('');

  } else if (activeView === 'group') {
    const groupEl = document.getElementById('itemsGroup');
    const groups = {};
    filtered.forEach(item => {
      const pc = primaryCat(item);
      if (!groups[pc]) groups[pc] = [];
      groups[pc].push(item);
    });
    const catOrder = ['gas-service','gas-main','gas-leak','excavation','restoration','saw-cut','electric','misc'];
    let html = '';
    for (const cat of catOrder) {
      if (!groups[cat]?.length) continue;
      const meta = CAT_META[cat];
      html += `<div class="group-section">
        <div class="group-header" style="background:${meta.color}18;border-left-color:${meta.color}">
          <span class="group-title" style="color:${meta.color}">${meta.label}</span>
          <span class="group-count">${groups[cat].length} items</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px">
          ${groups[cat].map(cardHtml).join('')}
        </div>
      </div>`;
    }
    groupEl.innerHTML = html || `<div class="no-results"><strong>NO ITEMS FOUND</strong>Try a different search or filter</div>`;
  }
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchTags = [];
  clearBtn.classList.remove('show');
  renderTags();
  render();
});

document.getElementById('filterRow').addEventListener('click', e => {
  const pill = e.target.closest('.fpill');
  if (!pill) return;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeCat = pill.dataset.cat;
  render();
});

document.getElementById('searchTags').addEventListener('click', e => {
  const x = e.target.closest('.stag-x');
  if (!x) return;
  removeTag(parseInt(x.dataset.i));
  clearBtn.classList.toggle('show', searchTags.length > 0 || searchInput.value.length > 0);
});

document.getElementById('btnList').addEventListener('click', () => setView('list'));
document.getElementById('btnGrid').addEventListener('click', () => setView('grid'));
document.getElementById('btnGroup').addEventListener('click', () => setView('group'));

// ─────────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────────
function setView(v) {
  activeView = v;
  const grid  = document.getElementById('itemsGrid');
  const list  = document.getElementById('itemsList');
  const group = document.getElementById('itemsGroup');
  grid.style.display  = v === 'grid'  ? 'grid'  : 'none';
  list.style.display  = v === 'list'  ? 'block' : 'none';
  group.style.display = v === 'group' ? 'block' : 'none';
  document.getElementById('btnGrid').classList.toggle('active', v==='grid');
  document.getElementById('btnList').classList.toggle('active', v==='list');
  document.getElementById('btnGroup').classList.toggle('active', v==='group');
  render();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
setView('list');
</script>
</body>
</html>
